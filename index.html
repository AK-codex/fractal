<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fractal Video Generator</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage-panel" aria-label="Animated fractal canvas">
        <canvas id="fractalCanvas" width="900" height="900"></canvas>
        <div class="hud">
          <span id="presetLabel">Classic Mandelbrot</span>
          <span id="stats">0 fps</span>
        </div>
      </section>

      <aside class="control-panel" aria-label="Fractal controls">
        <h1>Fractal Video Generator</h1>
        <p>
          Create evolving, psychedelic fractal loops with a morphing Mandelbrot/Julia renderer.
        </p>

        <label>
          Preset
          <select id="preset">
            <option value="mandelbrot">Classic Mandelbrot</option>
            <option value="seahorse">Seahorse Valley</option>
            <option value="julia">Electric Julia</option>
            <option value="burningShip">Burning Ship</option>
          </select>
        </label>

        <label>
          Palette
          <select id="palette">
            <option value="nebula">Nebula</option>
            <option value="lava">Lava</option>
            <option value="aurora">Aurora</option>
            <option value="mono">Monochrome</option>
          </select>
        </label>

        <label>
          Quality
          <select id="resolution">
            <option value="540" selected>540x540 fast</option>
            <option value="720">720x720 balanced</option>
            <option value="900">900x900 crisp</option>
            <option value="1200">1200x1200 export</option>
          </select>
        </label>

        <label>
          Iterations <output id="iterationOutput">180</output>
          <input id="iterations" type="range" min="40" max="420" value="180" />
        </label>

        <label>
          Zoom speed <output id="speedOutput">0.45</output>
          <input id="speed" type="range" min="0" max="120" value="45" />
        </label>

        <label>
          Glow <output id="glowOutput">0.60</output>
          <input id="glow" type="range" min="0" max="100" value="60" />
        </label>

        <label>
          Trail <output id="trailOutput">0.22</output>
          <input id="trail" type="range" min="0" max="90" value="22" />
        </label>

        <div class="button-row">
          <button id="toggleAnimation" type="button">Pause</button>
          <button id="randomize" type="button">Randomize</button>
          <button id="savePng" type="button">Save PNG</button>
        </div>

        <p class="hint">
          Tip: use a screen recorder while the animation plays to make a full fractal video.
        </p>
      </aside>
    </main>

    <script src="src/fractal.js"></script>
  </body>
</html>
